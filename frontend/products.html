<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - FarmBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --green: #2d6a2d; --green-dark: #1a4a1a; --green-light: #4a9e4a; --orange: #e07b39; --cream: #faf7f2; --border: #d4e8d4; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); }
  nav { background: var(--green-dark); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 70px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-text strong { font-family: 'Playfair Display', serif; font-size: 22px; color: white; display: block; }
  .logo-text span { font-size: 11px; color: #a8d5a8; }
  .nav-links { list-style: none; display: flex; gap: 28px; align-items: center; }
  .nav-links a { color: #d4ead4; text-decoration: none; font-size: 14px; font-weight: 500; }
  .cart-btn { background: var(--orange); color: white; border: none; padding: 8px 18px; border-radius: 25px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .cart-badge { background: white; color: var(--orange); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .page-header { text-align: center; margin-bottom: 40px; }
  .page-header h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--green-dark); }
  .page-header p { color: #777; margin-top: 8px; }
  .filters { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; padding: 12px 18px; border: 2px solid var(--border); border-radius: 30px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
  .search-box:focus { border-color: var(--green); }
  .cat-btn { padding: 10px 20px; border-radius: 25px; border: 2px solid var(--border); background: white; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .cat-btn.active, .cat-btn:hover { background: var(--green); color: white; border-color: var(--green); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
  .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.08); border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
  .card-img { width: 100%; height: 200px; object-fit: cover; }
  .card-img-placeholder { width: 100%; height: 200px; background: #e8f5e8; display: flex; align-items: center; justify-content: center; font-size: 60px; }
  .card-body { padding: 18px; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--green-dark); margin-bottom: 4px; }
  .card-farmer { font-size: 12px; color: #888; margin-bottom: 8px; }
  .card-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 14px; min-height: 40px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-price { font-size: 22px; font-weight: 700; color: var(--green); }
  .card-price span { font-size: 13px; font-weight: 400; color: #888; }
  .add-btn { background: var(--green); color: white; border: none; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .add-btn:hover { background: var(--green-light); }
  .add-btn.added { background: var(--orange); }
  .stock-badge { font-size: 11px; color: #e74c3c; font-weight: 600; }
  .loading { text-align: center; padding: 80px; color: #888; font-size: 18px; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--green-dark); color: white; padding: 14px 22px; border-radius: 10px; font-weight: 600; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  footer { background: var(--green-dark); color: #a8d5a8; text-align: center; padding: 24px; font-size: 13px; margin-top: 60px; }
  footer span { color: white; }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none; padding:4px; }
  .hamburger span { width:24px; height:2px; background:white; border-radius:2px; display:block; }
  .mobile-menu { display:none; position:fixed; top:70px; left:0; right:0; background:var(--green-dark); padding:16px 5% 20px; z-index:99; }
  .mobile-menu.open { display:block; }
  .mobile-menu ul { list-style:none; }
  .mobile-menu ul li a { display:block; padding:13px 0; color:#d4ead4; text-decoration:none; font-size:15px; border-bottom:1px solid #2d5a2d; }
  @media (max-width:700px) { .nav-links { display:none; } .hamburger { display:flex; } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <span style="font-size:26px">🌿</span>
    <div class="logo-text"><strong>FarmBuddy</strong><span>Fresh from Farm to Your Home</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="farmers.html">Farmers</a></li>
    <li id="authNavItem"><a href="login.html">Login</a></li>
  </ul>
  <a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-badge" id="cartCount">0</span></a>
  <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <ul>
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="farmers.html">👨‍🌾 Farmers</a></li>
    <li><a href="cart.html">🛒 Cart</a></li>
  </ul>
</div>

<div class="main">
  <div class="page-header">
    <h1>🌾 Fresh Products</h1>
    <p>Directly from local farmers to your doorstep</p>
  </div>
  <div class="filters">
    <input class="search-box" id="searchInput" placeholder="🔍 Search products..." oninput="filterProducts()">
    <button class="cat-btn active" onclick="setCategory('', this)">All</button>
    <button class="cat-btn" onclick="setCategory('vegetables', this)">🥦 Vegetables</button>
    <button class="cat-btn" onclick="setCategory('fruits', this)">🍎 Fruits</button>
    <button class="cat-btn" onclick="setCategory('grains', this)">🌾 Grains</button>
    <button class="cat-btn" onclick="setCategory('dairy', this)">🥛 Dairy</button>
  </div>
  <div id="productGrid" class="grid"><div class="loading">Loading products...</div></div>
</div>

<div class="toast" id="toast"></div>
<footer><p>© 2024 <span>FarmBuddy</span>. All rights reserved.</p></footer>
<script src="js/api.js"></script>
<script>
  let allProducts = [];
  let currentCategory = '';

  // Nav
  const user = getUser();
  if (user) document.getElementById('authNavItem').innerHTML = `<a href="#" onclick="Auth.logout()">Logout</a>`;
  document.getElementById('cartCount').textContent = Cart.count();

  async function loadProducts() {
    try {
      const res = await Products.getAll();
      allProducts = res.products;
      renderGrid(allProducts);
    } catch (err) {
      document.getElementById('productGrid').innerHTML = `<p style="color:#e74c3c;padding:40px">Failed to load products. Is the backend running?<br><small>${err.message}</small></p>`;
    }
  }

  function renderGrid(products) {
    const grid = document.getElementById('productGrid');
    if (!products.length) { grid.innerHTML = '<p style="color:#888;padding:40px;text-align:center">No products found.</p>'; return; }
    grid.innerHTML = products.map(p => `
      <div class="card">
        ${p.imageUrl ? `<img class="card-img" src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'">` : `<div class="card-img-placeholder">🌿</div>`}
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-farmer">by ${p.farmerId?.farmName || p.farmerId?.username || 'Local Farmer'} ${p.farmerId?.location ? '· '+p.farmerId.location : ''}</div>
          <div class="card-desc">${p.description || 'Fresh farm produce'}</div>
          ${p.stock < 5 && p.stock > 0 ? `<div class="stock-badge">⚠️ Only ${p.stock} left</div>` : ''}
          ${p.stock === 0 ? `<div class="stock-badge">❌ Out of stock</div>` : ''}
          <div class="card-footer">
            <div class="card-price">₹${p.price}<span>/kg</span></div>
            <button class="add-btn" ${p.stock === 0 ? 'disabled' : ''} onclick="addToCart(this, ${JSON.stringify(p).replace(/"/g, '&quot;')})">+ Add</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function addToCart(btn, product) {
    Cart.add(product, 1);
    document.getElementById('cartCount').textContent = Cart.count();
    btn.textContent = '✓ Added';
    btn.classList.add('added');
    setTimeout(() => { btn.textContent = '+ Add'; btn.classList.remove('added'); }, 1200);
    showToast(`${product.name} added to cart!`);
  }

  function filterProducts() {
    const kw = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allProducts.filter(p =>
      (!currentCategory || p.category === currentCategory) &&
      (!kw || p.name.toLowerCase().includes(kw) || (p.description || '').toLowerCase().includes(kw))
    );
    renderGrid(filtered);
  }

  function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterProducts();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  loadProducts();
</script>
</body>
</html>
