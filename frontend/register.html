<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - FarmBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --green: #2d6a2d; --green-dark: #1a4a1a; --green-light: #4a9e4a; --orange: #e07b39; --cream: #faf7f2; --border: #d4e8d4; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
  nav { background: var(--green-dark); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 70px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-text strong { font-family: 'Playfair Display', serif; font-size: 22px; color: white; display: block; }
  .logo-text span { font-size: 11px; color: #a8d5a8; }
  .nav-links { list-style: none; display: flex; gap: 30px; }
  .nav-links a { color: #d4ead4; text-decoration: none; font-size: 14px; }
  .register-page { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 48px 24px; }
  .register-card { background: white; border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 520px; box-shadow: 0 4px 40px rgba(0,0,0,0.1); border: 1px solid var(--border); animation: slideUp 0.5s ease; }
  @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  .reg-header { text-align: center; margin-bottom: 32px; }
  .reg-header .icon { font-size: 44px; }
  .reg-header h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--green-dark); margin: 8px 0 4px; }
  .reg-header p { color: #888; font-size: 14px; }
  .form-group { margin-bottom: 16px; }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
  .input-wrap { position: relative; }
  .input-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; }
  input[type=text], input[type=email], input[type=password], input[type=tel], select, textarea {
    width: 100%; padding: 12px 14px 12px 42px; border: 2px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: #333; transition: border-color 0.2s; outline: none; background: #fafffe;
  }
  textarea { padding-left: 42px; resize: vertical; min-height: 80px; }
  input:focus, select:focus, textarea:focus { border-color: var(--green); background: white; }
  .farmer-section { background: #eafaea; border: 1px solid #a8d5a8; border-radius: 12px; padding: 20px; margin: 16px 0; }
  .farmer-section h3 { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 14px; }
  .btn-submit { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 16px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
  .btn-submit:hover:not(:disabled) { background: var(--green-light); transform: translateY(-2px); }
  .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #888; }
  .auth-footer a { color: var(--green); font-weight: 600; text-decoration: none; }
  .error-msg { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
  footer { background: var(--green-dark); color: #a8d5a8; text-align: center; padding: 20px; font-size: 13px; }
  footer span { color: white; }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none; padding:4px; }
  .hamburger span { width:24px; height:2px; background:white; border-radius:2px; display:block; }
  .mobile-menu { display:none; position:fixed; top:70px; left:0; right:0; background:var(--green-dark); padding:16px 5% 20px; z-index:99; }
  .mobile-menu.open { display:block; }
  .mobile-menu ul { list-style:none; }
  .mobile-menu ul li a { display:block; padding:13px 0; color:#d4ead4; text-decoration:none; font-size:15px; border-bottom:1px solid #2d5a2d; }
  @media (max-width:700px) { .nav-links { display:none; } .hamburger { display:flex; } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <span style="font-size:26px">🌿</span>
    <div class="logo-text"><strong>FarmBuddy</strong><span>Fresh from Farm to Your Home</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
  <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <ul>
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="products.html">🛍️ Products</a></li>
    <li><a href="login.html">🔑 Login</a></li>
  </ul>
</div>

<div class="register-page">
  <div class="register-card">
    <div class="reg-header">
      <div class="icon">🌿</div>
      <h1>Create an Account</h1>
      <p>Join us today!</p>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap"><span class="icon">👤</span><input type="text" id="username" placeholder="Choose a username"></div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap"><span class="icon">✉️</span><input type="email" id="email" placeholder="Enter your email"></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap"><span class="icon">🔒</span><input type="password" id="password" placeholder="Create password (min 6 chars)"></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap"><span class="icon">🔒</span><input type="password" id="confirmPassword" placeholder="Confirm password"></div>
    </div>
    <div class="form-group">
      <label>Select Role</label>
      <div class="input-wrap"><span class="icon">👥</span>
        <select id="roleSelect" onchange="toggleFarmer(this.value)">
          <option value="customer">Customer</option>
          <option value="farmer">Farmer</option>
        </select>
      </div>
    </div>
    <div class="farmer-section" id="farmerSection" style="display:none">
      <h3>🌾 Farmer Details</h3>
      <div class="form-group">
        <label>Farm Name</label>
        <div class="input-wrap"><span class="icon">🏡</span><input type="text" id="farmName" placeholder="e.g. Green Valley Farms"></div>
      </div>
      <div class="form-group">
        <label>Farm Location</label>
        <div class="input-wrap"><span class="icon">📍</span><input type="text" id="location" placeholder="City, State"></div>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <div class="input-wrap"><span class="icon">📱</span><input type="tel" id="phone" placeholder="+91 XXXXX XXXXX"></div>
      </div>
    </div>
    <button class="btn-submit" id="regBtn" onclick="register()">Register</button>
    <div class="auth-footer">Already have an account? <a href="login.html">Login here</a></div>
  </div>
</div>

<footer><p>© 2024 <span>FarmBuddy</span>. All rights reserved.</p></footer>
<script src="js/api.js"></script>
<script>
  function toggleFarmer(val) {
    document.getElementById('farmerSection').style.display = val === 'farmer' ? 'block' : 'none';
  }
  async function register() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const role = document.getElementById('roleSelect').value;
    const errEl = document.getElementById('errorMsg');
    const btn = document.getElementById('regBtn');
    errEl.style.display = 'none';
    if (!username || !email || !password) { errEl.textContent = 'Please fill in all required fields.'; errEl.style.display = 'block'; return; }
    if (password !== confirmPassword) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
    const data = { username, email, password, role };
    if (role === 'farmer') {
      data.farmName = document.getElementById('farmName').value.trim();
      data.location = document.getElementById('location').value.trim();
      data.phone    = document.getElementById('phone').value.trim();
    }
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const res = await Auth.register(data);
      window.location.href = res.user.role === 'farmer' ? 'farmer2.html' : 'index.html';
    } catch (err) {
      errEl.textContent = err.message; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Register';
    }
  }
</script>
</body>
</html>
